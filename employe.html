<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ACE TAXI">
  <link rel="manifest" href="manifest-employe.json">
  <meta name="theme-color" content="#0f0f0f">
  <title>ACE TAXI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0f0f0;--text2:#888;--text3:#444;--accent:#f5c842;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--orange:#fb923c;--radius:14px;--radius-sm:8px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .screen{display:none;min-height:100vh;padding-bottom:60px}
    .screen.active{display:block}
    .login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
    .login-logo{width:72px;height:72px;background:var(--accent);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem}
    .login-title{font-size:28px;font-weight:600;margin-bottom:6px}
    .login-sub{font-size:14px;color:var(--text2);margin-bottom:2.5rem}
    .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:360px}
    .lbl{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;display:block}
    .login-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:22px;font-family:'DM Mono',monospace;color:var(--text);letter-spacing:0.2em;text-align:center;outline:none;transition:border-color 0.2s}
    .login-input:focus{border-color:var(--accent)}
    .login-btn{width:100%;margin-top:14px;background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
    .login-btn:active{opacity:0.85}
    .login-err{color:var(--red);font-size:13px;margin-top:10px;text-align:center;display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
    .topbar-title{font-size:17px;font-weight:600}
    .badge-employe{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace;margin-top:3px;background:rgba(74,222,128,0.12);color:var(--green)}
    .topbar-right{display:flex;gap:6px}
    .tbtn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif}
    .sync-bar{display:flex;align-items:center;gap:8px;padding:7px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
    .sdot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .sdot.ok{background:var(--green)}.sdot.loading{background:var(--accent);animation:pulse 1s infinite}.sdot.err{background:var(--red)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-family:'DM Sans',sans-serif;transition:all 0.15s}
    .btn:active{transform:scale(0.97)}
    .btn-green{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.3);color:var(--green);font-weight:600}
    .btn-blue{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.3);color:var(--blue);font-weight:600}
    .btn-orange{background:rgba(251,146,60,0.12);border-color:rgba(251,146,60,0.3);color:var(--orange);font-weight:600}
    .btn-sm{padding:5px 10px;font-size:12px}
    .filters{display:flex;gap:8px;padding:12px 14px 10px;flex-wrap:wrap}
    .filters input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
    .list{padding:0 14px;display:flex;flex-direction:column;gap:8px}
    .tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:all 0.3s}
    .tcard.termine{opacity:0.35;filter:grayscale(1)}
    .tcard-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .tcard-datetime{font-size:14px;font-weight:600}
    .tcard-sub{font-size:12px;color:var(--text2);margin-top:2px}
    .status-tag{font-size:11px;padding:3px 8px;border-radius:20px;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap}
    .status-afaire{background:rgba(245,200,66,0.15);color:var(--accent)}
    .status-encours{background:rgba(251,146,60,0.15);color:var(--orange)}
    .status-termine{background:rgba(100,100,100,0.2);color:var(--text3)}
    .client-stop{background:var(--bg3);border-radius:var(--radius-sm);padding:10px;margin-bottom:6px;border-left:3px solid var(--border2)}
    .client-stop.statut-pris{border-left-color:var(--orange)}
    .client-stop.statut-arrive{border-left-color:var(--blue)}
    .client-stop.statut-termine{border-left-color:var(--green);opacity:0.6}
    .client-stop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .client-stop-nom{font-size:13px;font-weight:600}
    .stop-statut-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-family:'DM Mono',monospace;font-weight:500}
    .notif-banner{margin:10px 14px 0;background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--accent);display:none}
    .notif-banner.show{display:block}
    .empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
  </style>
</head>
<body>

<div id="s-login" class="screen active">
  <div class="login-wrap">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h1l2-3h10l2 3h1a2 2 0 012 2v6a2 2 0 01-2 2h-2"/>
        <circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/>
        <path d="M9 7l-1 3h8l-1-3"/>
      </svg>
    </div>
    <p class="login-title">ACE TAXI</p>
    <p class="login-sub">Entrez votre code d'accès</p>
    <div class="login-card">
      <span class="lbl">Code</span>
      <input type="password" class="login-input" id="lpwd" placeholder="•••" inputmode="text" autocomplete="off">
      <p class="login-err" id="lerr">Code incorrect</p>
      <button class="login-btn" onclick="doLogin()">Se connecter</button>
    </div>
  </div>
</div>

<div id="s-employe" class="screen">
  <div class="topbar">
    <div><div class="topbar-title">ACE TAXI</div><span class="badge-employe" id="emp-badge">Employé</span></div>
    <div class="topbar-right">
      <button class="tbtn" onclick="loadData()">↻</button>
      <button class="tbtn" onclick="logout()">Déco</button>
    </div>
  </div>
  <div class="sync-bar"><div class="sdot" id="sdot"></div><span id="stxt">Chargement...</span></div>
  <div class="notif-banner" id="notif-banner"></div>
  <div class="filters">
    <input type="date" id="fed" oninput="renderView()">
    <button class="btn btn-sm" onclick="document.getElementById('fed').value='';renderView()">Effacer</button>
  </div>
  <div class="list" id="list-employe"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ── Firebase ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCBKvI7dSauqWzeFd0KEDIMS8EJTZ5xj4Y",
  authDomain: "ace-taxi-a60b9.firebaseapp.com",
  projectId: "ace-taxi-a60b9",
  storageBucket: "ace-taxi-a60b9.firebasestorage.app",
  messagingSenderId: "390648146701",
  appId: "1:390648146701:web:fe0280d8239e97e1e1de44"
};
const VAPID_KEY = "BGaWG1TDhZmzmR9_gjnbt9UVaScsts_v_J2yEVUJDidMqUYbZcGM9Rp6kuyynjpYljCZl86dnvKNQ6M98zGzYvQ";

firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();

// ── Supabase ──────────────────────────────────────────────
const SURL='https://smgfzzmyuhihdiinqwkh.supabase.co';
const SKEY='sb_publishable_8sv-Hp6AGJb7qorD8tyA4Q_RQfReBNi';
const sb=supabase.createClient(SURL,SKEY);

let trajets=[],employes=[],clients=[],vehicules=[];
let currentEmp=null;

// ── Enregistrer le token FCM de l'employé dans Supabase ──
async function registerFCMToken(empId) {
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return;
    const token = await messaging.getToken({ vapidKey: VAPID_KEY });
    if (token) {
      await sb.from('employes').update({ 'jeton fcm': token }).eq('id', empId);
    }
  } catch (e) {
    console.warn('FCM token error:', e);
  }
}

// ── Envoyer notif au patron via Supabase Edge Function ──
async function notifyPatron(title, body) {
  try {
    // On récupère les tokens FCM des patrons (role = 'patron')
    const { data: patrons } = await sb.from('employes').select('jeton fcm').eq('rôle', 'patron');
    if (!patrons || !patrons.length) return;
    const tokens = patrons.map(p => p['jeton fcm']).filter(Boolean);
    if (!tokens.length) return;

    // Appel à la Edge Function Supabase pour envoyer la notif FCM
    await sb.functions.invoke('send-fcm-notification', {
      body: { tokens, title, body }
    });
  } catch (e) {
    console.warn('Notify patron error:', e);
  }
}

function setSS(status,msg){
  document.getElementById('sdot').className='sdot '+status;
  document.getElementById('stxt').textContent=msg;
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

async function doLogin(){
  const pwd=document.getElementById('lpwd').value.trim();
  document.getElementById('lerr').style.display='none';
  try{
    const{data}=await sb.from('employes').select('*');
    employes=data||[];
  }catch(e){}
  const emp=employes.find(e=>e.code===pwd);
  if(emp){
    currentEmp=emp;
    document.getElementById('emp-badge').textContent=emp.nom;
    show('s-employe');
    await registerFCMToken(emp.id);
    loadData();
  }else{
    document.getElementById('lerr').style.display='block';
  }
}
document.getElementById('lpwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function logout(){currentEmp=null;document.getElementById('lpwd').value='';show('s-login')}

async function loadData(){
  setSS('loading','Chargement...');
  try{
    const[rt,re,rc,rv]=await Promise.all([
      sb.from('trajets').select('*').order('date').order('heure'),
      sb.from('employes').select('*'),
      sb.from('clients').select('*'),
      sb.from('vehicules').select('*')
    ]);
    trajets=rt.data||[];employes=re.data||[];clients=rc.data||[];vehicules=rv.data||[];
    checkNouveaux();
    setSS('ok','Synchronisé · '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
    renderView();
  }catch(e){setSS('err','Erreur de connexion');}
}

function checkNouveaux(){
  const lastSeen=parseInt(localStorage.getItem('ace_seen_'+currentEmp.id)||'0');
  const nouveaux=trajets.filter(t=>t.created_at&&t.created_at>lastSeen);
  localStorage.setItem('ace_seen_'+currentEmp.id,Date.now().toString());
  const b=document.getElementById('notif-banner');
  if(nouveaux.length>0){b.textContent=nouveaux.length===1?'1 nouveau trajet depuis votre dernière connexion':`${nouveaux.length} nouveaux trajets`;b.classList.add('show');}
  else b.classList.remove('show');
}

function fmtDate(d){
  if(!d)return'';
  const[y,m,j]=d.split('-');
  const jours=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  return`${jours[new Date(+y,+m-1,+j).getDay()]} ${j}/${m}/${y}`;
}

function stopStatutTag(s){
  if(!s||s==='attente')return'<span class="stop-statut-tag status-afaire">En attente</span>';
  if(s==='pris')return'<span class="stop-statut-tag status-encours">🚗 Pris en charge</span>';
  if(s==='arrive')return'<span class="stop-statut-tag" style="background:rgba(96,165,250,0.15);color:var(--blue)">📍 Arrivé</span>';
  if(s==='termine')return'<span class="stop-statut-tag status-termine">✓ Terminé</span>';
  return'';
}

function renderView(){
  const fd=document.getElementById('fed').value;
  const list=trajets.filter(t=>!fd||t.date===fd);
  const el=document.getElementById('list-employe');
  if(!list.length){el.innerHTML='<div class="empty">Aucun trajet</div>';return;}
  el.innerHTML=list.map(t=>{
    const emp=employes.find(e=>e.id===t.emp_id);
    const veh=vehicules.find(v=>v.id===t.vehicule_id);
    const stopsData=t.stops||[];
    const termine=t.statut==='termine';
    const encours=t.statut==='encours';
    return`<div class="tcard${termine?' termine':''}">
      <div class="tcard-head">
        <div>
          <div class="tcard-datetime">${fmtDate(t.date)}</div>
          <div class="tcard-sub">${emp?emp.nom:'—'}${veh?' · 🚗 '+veh.marque+' '+veh.modele:''}</div>
        </div>
        <span class="status-tag ${termine?'status-termine':encours?'status-encours':'status-afaire'}">${termine?'✓ Terminé':encours?'🚗 En cours':'À faire'}</span>
      </div>
      ${stopsData.map((s,si)=>{
        const cli=clients.find(c=>c.id===s.client_id);
        const st=s.statut||'attente';
        const isAR=s.aller_retour||!!s.redeposer;
        let btns='';
        if(st==='attente')btns=`<button class="btn btn-orange btn-sm" style="width:100%;margin-top:8px" onclick="updateStop('${t.id}',${si},'pris')">🚗 Pris en charge</button>`;
        else if(st==='pris')btns=`<button class="btn btn-blue btn-sm" style="width:100%;margin-top:8px" onclick="updateStop('${t.id}',${si},'arrive')">📍 Arrivé à l'adresse</button>`;
        else if(st==='arrive'&&isAR)btns=`<button class="btn btn-green btn-sm" style="width:100%;margin-top:8px" onclick="updateStop('${t.id}',${si},'termine')">✓ Client redéposé</button>`;
        return`<div class="client-stop statut-${st}">
          <div class="client-stop-head">
            <span class="client-stop-nom">${cli?cli.nom:'Client '+(si+1)}${isAR?' 🔄':''}</span>
            <div style="display:flex;gap:4px;align-items:center">
              ${stopStatutTag(st)}
              ${cli&&cli.tel?`<a href="tel:${cli.tel}" class="btn btn-blue btn-sm" style="text-decoration:none">📞</a>`:''}
            </div>
          </div>
          <div style="font-size:12px;color:var(--text2)">
            ${s.heure_depart?s.heure_depart+' ':''}${s.depart||''}${s.depart&&s.arrivee?' → ':''}${s.arrivee||''}${s.heure_arrivee?' (arr. '+s.heure_arrivee+')':''}
            ${isAR&&s.redeposer&&st==='arrive'?`<div style="margin-top:4px;color:var(--blue)">↩ Redéposer à : ${s.redeposer}</div>`:''}
          </div>
          ${btns}
        </div>`;
      }).join('')}
      ${t.note?`<div style="background:var(--bg3);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;color:var(--text2);margin-top:8px">${t.note}</div>`:''}
    </div>`;
  }).join('');
}

async function updateStop(trajetId,stopIdx,newStatut){
  setSS('loading','Mise à jour...');
  const trajet=trajets.find(t=>t.id===trajetId);
  if(!trajet)return;
  const newStops=JSON.parse(JSON.stringify(trajet.stops||[]));
  newStops[stopIdx].statut=newStatut;

  // Si arrivé sans aller-retour → termine automatiquement
  if(newStatut==='arrive'&&!newStops[stopIdx].aller_retour&&!newStops[stopIdx].redeposer){
    newStops[stopIdx].statut='termine';
  }
  const allTermine=newStops.every(s=>s.statut==='termine');
  const anyPris=newStops.some(s=>s.statut==='pris'||s.statut==='arrive');
  const newTrajetStatut=allTermine?'termine':anyPris?'encours':'afaire';

  await sb.from('trajets').update({stops:newStops,statut:newTrajetStatut}).eq('id',trajetId);

  // ── Envoyer la notif au patron ──
  const cli=clients.find(c=>c.id===newStops[stopIdx].client_id);
  const cliNom=cli?cli.nom:'un client';
  const empNom=currentEmp?currentEmp.nom:'Un chauffeur';
  const statutFinal=newStops[stopIdx].statut;
  const adresseDepart=newStops[stopIdx].depart||'';
  const adresseArrivee=newStops[stopIdx].arrivee||'';
  let notifBody='';
  if(statutFinal==='pris')notifBody=`${empNom} a pris en charge ${cliNom}${adresseDepart?' — '+adresseDepart:''}`;
  else if(statutFinal==='arrive')notifBody=`${empNom} est arrivé avec ${cliNom}${adresseArrivee?' — '+adresseArrivee:''}`;
  else if(statutFinal==='termine')notifBody=`${empNom} a déposé ${cliNom} ✓${adresseArrivee?' — '+adresseArrivee:''}`;
  if(notifBody) await notifyPatron('🚗 ACE TAXI', notifBody);

  await loadData();
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>
